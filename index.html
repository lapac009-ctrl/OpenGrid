<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Core | Join the Future</title>
    <style>
        :root {
            --bg: #05050a;
            --glass: rgba(255, 255, 255, 0.05);
            --neon: #00f2fe;
            --accent: #4facfe;
            --text: #ffffff;
        }

        body, html {
            margin: 0; padding: 0;
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh; overflow: hidden;
        }

        /* --- LOGIN / REGISTER EKRAN --- */
        #auth-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(20px);
            z-index: 1000;
            display: flex; justify-content: center; align-items: center;
        }

        .auth-card {
            background: var(--glass);
            padding: 40px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            width: 350px;
            text-align: center;
            box-shadow: 0 0 50px rgba(0, 242, 254, 0.1);
        }

        .auth-card h2 { margin-bottom: 25px; color: var(--neon); }

        .auth-input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            color: white;
            box-sizing: border-box;
        }

        .auth-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(90deg, var(--neon), var(--accent));
            border: none;
            border-radius: 8px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .auth-btn:hover { transform: scale(1.02); box-shadow: 0 0 20px var(--neon); }

        /* --- MAIN APP INTERFACE (Sakriven dok se ne uloguješ) --- */
        #main-app {
            display: none; /* Prikazuje se nakon logina */
            height: 100vh;
            display: grid;
            grid-template-columns: 240px 1fr;
        }

        /* Sidebar */
        .sidebar {
            background: rgba(255,255,255,0.02);
            border-right: 1px solid rgba(255,255,255,0.05);
            padding: 20px;
        }

        /* Top Header & Profile */
        .top-nav {
            height: 70px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 30px;
            background: rgba(255,255,255,0.01);
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .search-area input {
            background: var(--glass);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 10px 20px;
            border-radius: 20px;
            color: white;
            width: 300px;
        }

        .user-controls {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .currency {
            color: var(--neon);
            font-weight: bold;
            background: rgba(0, 242, 254, 0.1);
            padding: 5px 15px;
            border-radius: 15px;
            font-size: 14px;
        }

        .profile-trigger {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
        }

        .avatar-circle {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(45deg, #4facfe, #00f2fe);
            border: 2px solid var(--neon);
        }

        /* Content Areas */
        .feed { padding: 40px; overflow-y: auto; }
        .section-title { font-size: 28px; margin-bottom: 10px; }

    </style>
</head>
<body>

    <div id="auth-overlay">
        <div class="auth-card">
            <h2 id="auth-title">Registracija</h2>
            <input type="text" id="reg-name" class="auth-input" placeholder="Korisničko ime">
            <input type="number" id="reg-age" class="auth-input" placeholder="Godine">
            <select id="reg-gender" class="auth-input">
                <option value="Muško">Muško</option>
                <option value="Žensko">Žensko</option>
            </select>
            <button class="auth-btn" onclick="login()">KRENI U NEXUS</button>
        </div>
    </div>

    <div id="main-app" style="display: none;">
        <div class="sidebar">
            <div style="font-size: 24px; font-weight: 800; color: var(--neon); margin-bottom: 40px;">NEXUS</div>
            <div style="color: var(--neon); margin-bottom: 15px;">● Početna</div>
            <div style="opacity: 0.5;">Otkrij</div>
            <div style="opacity: 0.5; margin-top: 15px;">Prodavnica</div>
            <div style="opacity: 0.5; margin-top: 15px;">Nexus Studio</div>
        </div>

        <div class="right-side">
            <div class="top-nav">
                <div class="search-area">
                    <input type="text" placeholder="Pretraži svetove...">
                </div>
                
                <div class="user-controls">
                    <div class="currency">N$ 1,500</div>
                    <div class="profile-trigger">
                        <span id="display-name">Ime</span>
                        <div class="avatar-circle"></div>
                    </div>
                </div>
            </div>

            <div class="feed">
                <h1 class="section-title">Dobrodošao, <span id="welcome-user">Korisniče</span>!</h1>
                <p style="color: rgba(255,255,255,0.5);">Tvoj nalog je spreman za 2026. godinu. Počni da gradiš ili istraži svetove.</p>
                
                <div style="margin-top: 50px; border: 2px dashed rgba(255,255,255,0.1); border-radius: 20px; height: 300px; display: flex; align-items: center; justify-content: center; flex-direction: column;">
                    <p>Trenutno nema dostupnih servera.</p>
                    <button class="auth-btn" style="width: auto; padding: 10px 30px;">NAPRAVI PRVI SVET</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        function login() {
            const name = document.getElementById('reg-name').value;
            const age = document.getElementById('reg-age').value;
            const gender = document.getElementById('reg-gender').value;

            if(name.length < 3) {
                alert("Ime mora imati bar 3 slova!");
                return;
            }

            // Sakrij login, pokaži aplikaciju
            document.getElementById('auth-overlay').style.display = 'none';
            document.getElementById('main-app').style.display = 'grid';

            // Postavi podatke na profilu
            document.getElementById('display-name').innerText = name;
            document.getElementById('welcome-user').innerText = name;

            console.log("Korisnik ulogovan:", {name, age, gender});
        }
    </script>

</body>
</html>
