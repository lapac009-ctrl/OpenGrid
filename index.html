<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <title>Nexus Core | Platforma Budućnosti</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            overflow: hidden;
        }

        /* Glavni kontejner sa Glassmorphism efektom */
        .dashboard {
            width: 900px;
            height: 600px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            box-shadow: 0 25px 45px rgba(0,0,0,0.5);
        }

        /* Sidebar (Meni sa strane) */
        .sidebar {
            width: 200px;
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            padding: 20px;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            color: #00f2fe;
            margin-bottom: 50px;
            text-shadow: 0 0 10px #00f2fe;
        }

        .menu-item {
            padding: 15px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: 0.3s;
            border-radius: 10px;
        }

        .menu-item:hover {
            background: rgba(255, 255, 255, 0.1);
            color: #4facfe;
        }

        /* Glavni sadržaj */
        .main-content {
            flex: 1;
            padding: 40px;
        }

        .welcome-text h1 {
            font-size: 40px;
            margin-bottom: 10px;
        }

        .game-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-top: 30px;
        }

        /* Kartice za igre */
        .game-card {
            background: rgba(255, 255, 255, 0.1);
            height: 150px;
            border-radius: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 1px solid transparent;
            transition: 0.4s;
            cursor: pointer;
        }

        .game-card:hover {
            border-color: #00f2fe;
            transform: translateY(-5px);
            box-shadow: 0 0 20px rgba(0, 242, 254, 0.4);
        }

        .btn-create {
            background: linear-gradient(90deg, #00f2fe, #4facfe);
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
            box-shadow: 0 5px 15px rgba(0, 242, 254, 0.3);
        }
    </style>
</head>
<body>

    <div class="dashboard">
        <div class="sidebar">
            <div class="logo">NEXUS</div>
            <div class="menu-item">Home</div>
            <div class="menu-item">Discover</div>
            <div class="menu-item">Studio (Beta)</div>
            <div class="menu-item">Avatars</div>
        </div>
        
        <div class="main-content">
            <div class="welcome-text">
                <h1>Dobrodošao nazad</h1>
                <p>Budućnost kreiranja je u tvojim rukama.</p>
            </div>

            <div class="game-grid">
                <div class="game-card">Tvoja Igra 1</div>
                <div class="game-card">Tvoja Igra 2</div>
                <div class="game-card" style="border: 2px dashed rgba(255,255,255,0.2);">+ Nova Igra</div>
            </div>

            <button class="btn-create">POKRENI STUDIO</button>
        </div>
    </div>

</body>
</html>
